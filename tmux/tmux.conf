# ============================================================
# Prefix: Ctrl-a instead of Ctrl-b
# ============================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================================
# General options
# ============================================================
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on

# ============================================================
# Terminal colors (lets glass/transparent background show through)
# ============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ============================================================
# Vim-like pane navigation (prefix + h/j/k/l)
# ============================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like pane resizing (prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================
# Splits and new windows in current directory
# ============================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# ============================================================
# Lazygit popup (prefix + g)
# ============================================================
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# ============================================================
# Theme - Catppuccin Mocha
# ============================================================
gray_light="#cdd6f4"    # text
gray_medium="#bac2de"   # subtext1
gray_dark="#313244"     # surface0
green_soft="#a6e3a1"    # green
blue_muted="#89b4fa"    # blue
cyan_soft="#94e2d5"     # teal

set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light},nobold] | "
set -g window-status-current-format "#[fg=${cyan_soft},bold]  #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

# ============================================================
# Window/pane numbering
# ============================================================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
